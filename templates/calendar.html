{% extends "base.html" %}
{% block content %}
<style>

/* =========================
   BASE UI
========================= */
body{
    background:#f4f6fb;
    font-family:"Segoe UI",system-ui,Arial,sans-serif;
    color:#1e293b;
}

/* =========================
   WRAPPER
========================= */
.calendar-wrapper{
    margin-top:6px;
}

/* =========================
   CARD
========================= */
.card{
    background:#fff;
    border:1px solid #e5e7eb !important;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(15,23,42,.06);
    overflow:hidden;
}

/* =========================
   CALENDAR CORE
========================= */
#calendar{
    font-size:.8rem;
    color:#1f2937;
}

/* =========================
   TITLE
========================= */
.fc-toolbar-title{
    font-size:.95rem !important;
    font-weight:700;
    color:#0f172a;
}

/* =========================
   BUTTONS
========================= */
.fc-button{
    font-size:.72rem !important;
    padding:4px 10px !important;
    border-radius:8px !important;
}

/* =========================
   EVENTS BASE
========================= */
.fc-daygrid-event{
    font-size:.72rem;
    padding:3px 6px;
    border-radius:6px;
    border:none !important;
}

/* =========================
   APPOINTMENTS (BLUE = PRIMARY)
========================= */
.fc-event.appointment-event{
    background:#2563eb !important;
    color:#fff !important;
    font-weight:600;
}

/* =========================
   INVITATIONS (UPCOMING → YELLOW TEXT)
========================= */
.fc-event.invitation-event{
    background:#ffffff !important;
    color:#facc15 !important;  /* yellow text */
    font-weight:600;
    border:1px solid #facc15 !important;
}

/* =========================
   OVERDUE (DARK GREY)
========================= */
.fc-event.invitation-overdue{
    background:#4b5563 !important;  /* dark grey */
    color:#ffffff !important;       /* readable text */
    font-weight:600;
    border:1px solid #374151 !important;
}

/* =========================
   PASSED (DARK GREY)
========================= */
.fc-event.invitation-passed{
    background:#374151 !important;  /* darker grey */
    color:#ffffff !important;       /* readable text */
    font-weight:600;
    border:1px solid #1f2937 !important;
}

/* =========================
   HOVER
========================= */
.fc-event:hover{
    opacity:.92;
}

/* =========================
   MORE LINK
========================= */
.fc-daygrid-more-link{
    background:#e2e8f0 !important;
    color:#1e293b !important;
    font-size:.7rem !important;
    border-radius:5px;
    padding:2px 6px;
}

/* =========================
   GRID
========================= */
.fc-theme-standard td,
.fc-theme-standard th{
    border-color:#e5e7eb !important;
}

/* =========================
   TODAY CELL
========================= */
.fc-day-today{
    background:#eff6ff !important;
}

/* =========================
   HEADER ROW
========================= */
.fc-col-header-cell{
    background:#f8fafc;
    font-weight:600;
}

/* =========================
   MOBILE
========================= */
@media (max-width:768px){

    #calendar{
        font-size:.65rem;
        height:420px !important;
    }

    .fc-toolbar{
        flex-direction:column !important;
        gap:6px;
        align-items:stretch !important;
    }

    .fc-toolbar-title{
        font-size:.85rem !important;
        text-align:center;
    }

    .fc-button{
        font-size:.65rem !important;
        padding:2px 6px !important;
    }

}

/* =========================
   MODAL
========================= */
#confirmModal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.45);
    z-index:9999;
}

.modal-box{
    background:#fff;
    width:320px;
    max-width:90%;
    margin:18% auto;
    padding:16px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 4px 15px rgba(0,0,0,.15);
}

</style>

<div class="container-fluid px-2 px-md-3 py-2 calendar-wrapper">

    <div class="d-flex justify-content-between align-items-center mb-2">
        <h6 class="fw-bold mb-0 text-dark">
            <i class="bi bi-calendar-week text-primary"></i> Calendar
        </h6>
    </div>

    <div class="card shadow-sm border-0 rounded-3">
        <div class="card-body p-1">
            <div id="calendar"></div>
        </div>
    </div>
</div>

<!-- MODAL -->
<div id="confirmModal">
    <div class="modal-box">
        <h6 class="mb-2">Confirm Reschedule</h6>
        <p id="moveText"></p>

        <button class="btn btn-success btn-sm" onclick="confirmMove()">Yes</button>
        <button class="btn btn-secondary btn-sm" onclick="cancelMove()">Cancel</button>
    </div>
</div>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/index.global.min.js"></script>

<script>

let pendingEvent = null;
let hoverDate = null;

document.addEventListener("DOMContentLoaded", () => {

    const modal = document.getElementById("confirmModal");
    const moveText = document.getElementById("moveText");

    const calendar = new FullCalendar.Calendar(
        document.getElementById("calendar"), {

        initialView: "dayGridMonth",
        height: "auto",
        editable: true,
        dayMaxEvents: 5,
        moreLinkClick: "popover",

        headerToolbar: {
            left: "prev,next",
            center: "title",
            right:
                window.innerWidth < 768
                    ? "today"
                    : "dayGridMonth,timeGridWeek,timeGridDay"
        },

        events: "/calendar/events",

        /* =========================
           BLOCK PAST DRAGGING
        ========================= */
        eventAllow: function(dropInfo) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            return dropInfo.start >= today;
        },

        /* =========================
           CLICK NAVIGATION
        ========================= */
        eventClick(info) {

            const id = info.event.id;

            if (id.startsWith("appointment-")) {
                window.location.href =
                    "/appointment/" + id.replace("appointment-", "");
            }

            else if (id.startsWith("invitation-")) {
                window.location.href =
                    "/invitations/view/" + id.replace("invitation-", "");
            }
        },

        /* =========================
           LIVE SLOT PREVIEW (HOVER DAY)
        ========================= */
        eventDragStart(info) {
            pendingEvent = info;
        },

        eventDragStop(info) {

            const date = info.event.startStr.split("T")[0];

            hoverDate = date;

            fetch(`/appointments/api/check-slot?date=${date}`)
                .then(r => r.json())
                .then(data => {

                    const cell = document.querySelector(`[data-date="${date}"]`);

                    if (!cell) return;

                    // reset previous highlight
                    document.querySelectorAll(".fc-daygrid-day").forEach(el => {
                        el.style.background = "";
                    });

                    if (data.available) {
                        cell.style.background = "#dcfce7"; // green
                    } else {
                        cell.style.background = "#fee2e2"; // red
                    }

                })
                .catch(() => {});

        },

        /* =========================
           DRAG DROP (FINAL CHECK)
        ========================= */
        eventDrop(info) {

            const id = info.event.id;
            const newDate = info.event.startStr.split("T")[0];

            if (!id.startsWith("appointment-")) {
                info.revert();
                return;
            }

            // 🔴 PRE-CHECK SLOT BEFORE SAVE
            fetch(`/appointments/api/check-slot?date=${newDate}`)
                .then(r => r.json())
                .then(slot => {

                    if (!slot.available) {
                        info.revert();
                        alert("⚠ Slot already booked on this date");
                        return;
                    }

                    // SAVE ONLY IF AVAILABLE
                    return fetch("/appointments/api/reschedule", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            id: id,
                            new_date: newDate
                        })
                    });

                })
                .then(async (r) => {

                    if (!r) return;

                    let data;
                    try {
                        data = await r.json();
                    } catch (e) {
                        throw { message: "Invalid server response" };
                    }

                    if (!data.success) {
                        throw data;
                    }

                    alert("✅ " + (data.message || "Rescheduled successfully"));
                })
                .catch(err => {

                    info.revert();

                    alert(err.message || "Update failed");
                });

        }

    });

    calendar.render();

});


/* =========================
   MODAL ACTIONS (kept safe fallback)
========================= */
function confirmMove() {

    if (!pendingEvent) return;

    const eventRef = pendingEvent;
    const newDate = eventRef.event.startStr.split("T")[0];

    pendingEvent = null;

    fetch("/appointments/api/reschedule", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            id: eventRef.event.id,
            new_date: newDate
        })
    })
    .then(r => r.json())
    .then(data => {

        if (!data.success) {
            eventRef.revert();
            throw new Error(data.message);
        }

        alert("✅ " + data.message);
    })
    .catch(err => {
        eventRef.revert();
        alert(err.message || "Update failed");
    })
    .finally(() => closeModal());
}


/* =========================
   CANCEL MOVE
========================= */
function cancelMove() {

    if (pendingEvent) pendingEvent.revert();

    closeModal();
}


/* =========================
   CLOSE MODAL
========================= */
function closeModal() {

    const modal = document.getElementById("confirmModal");

    if (modal) modal.style.display = "none";

    pendingEvent = null;
}

</script>

{% endblock %}
